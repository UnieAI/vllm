<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Segoe UI, Arial, sans-serif" font-size="12">
  <rect width="1200" height="900" fill="#1e1e2e"/>

  <text x="600" y="34" text-anchor="middle" font-size="21" font-weight="bold" fill="#ffffff">QEfficient Paged Attention — Compile-Time vs Runtime Contract</text>

  <!-- Legend -->
  <rect x="58" y="60" width="16" height="16" rx="3" fill="#4a2f14" stroke="#ffb86c"/>
  <text x="82" y="73" fill="#ffffff" font-size="12">QEfficient compile-time</text>
  <rect x="280" y="60" width="16" height="16" rx="3" fill="#1a3a5c" stroke="#4a9eff"/>
  <text x="304" y="73" fill="#ffffff" font-size="12">vLLM-QAIC runtime</text>
  <rect x="500" y="60" width="16" height="16" rx="3" fill="#3d3520" stroke="#d4a843"/>
  <text x="524" y="73" fill="#ffffff" font-size="12">QPC / QAIC card</text>
  <rect x="710" y="60" width="16" height="16" rx="3" fill="#173d31" stroke="#55c998"/>
  <text x="734" y="73" fill="#ffffff" font-size="12">Paged KV data contract</text>

  <!-- Compile lane -->
  <text x="50" y="118" font-size="15" font-weight="bold" fill="#aaaaaa">COMPILE-TIME: QEfficient builds the graph that knows paged KV</text>

  <rect x="60" y="140" width="210" height="95" rx="6" fill="#4a2f14" stroke="#ffb86c" stroke-width="1.5"/>
  <text x="165" y="163" text-anchor="middle" font-weight="bold" fill="#ffe0b3">HF model</text>
  <text x="165" y="181" text-anchor="middle" font-size="10" fill="#ffd19a">Qwen/Qwen2.5 weights</text>
  <text x="165" y="196" text-anchor="middle" font-size="10" fill="#ffd19a">config: heads, layers, dtype</text>
  <text x="165" y="211" text-anchor="middle" font-size="10" fill="#ffd19a">ctx_len chosen for QPC</text>

  <rect x="320" y="140" width="230" height="95" rx="6" fill="#4a2f14" stroke="#ffb86c" stroke-width="1.5"/>
  <text x="435" y="163" text-anchor="middle" font-weight="bold" fill="#ffe0b3">export(paged_kv=True)</text>
  <text x="435" y="181" text-anchor="middle" font-size="10" fill="#ffd19a">adds block_table graph input</text>
  <text x="435" y="196" text-anchor="middle" font-size="10" fill="#ffd19a">past_k/v become block pools</text>
  <text x="435" y="211" text-anchor="middle" font-size="10" fill="#ffd19a">page axis is symbolic</text>

  <rect x="600" y="140" width="235" height="95" rx="6" fill="#4a2f14" stroke="#ffb86c" stroke-width="1.5"/>
  <text x="717" y="163" text-anchor="middle" font-weight="bold" fill="#ffe0b3">compile(paged_kv=True)</text>
  <text x="717" y="181" text-anchor="middle" font-size="10" fill="#ffd19a">binds num_blocks=N</text>
  <text x="717" y="196" text-anchor="middle" font-size="10" fill="#ffd19a">binds page_size=128</text>
  <text x="717" y="211" text-anchor="middle" font-size="10" fill="#ffd19a">binds max_num_blocks=ceil(ctx/page)</text>

  <rect x="890" y="140" width="230" height="95" rx="6" fill="#3d3520" stroke="#d4a843" stroke-width="1.5"/>
  <text x="1005" y="163" text-anchor="middle" font-weight="bold" fill="#ffd966">QPC package</text>
  <text x="1005" y="181" text-anchor="middle" font-size="10" fill="#c9a84c">compiled graph on QAIC</text>
  <text x="1005" y="196" text-anchor="middle" font-size="10" fill="#c9a84c">retained KV state on card</text>
  <text x="1005" y="211" text-anchor="middle" font-size="10" fill="#c9a84c">loaded by vLLM-QAIC</text>

  <line x1="270" y1="188" x2="320" y2="188" stroke="#ffb86c" stroke-width="1.7" marker-end="url(#arrow-orange)"/>
  <line x1="550" y1="188" x2="600" y2="188" stroke="#ffb86c" stroke-width="1.7" marker-end="url(#arrow-orange)"/>
  <line x1="835" y1="188" x2="890" y2="188" stroke="#d4a843" stroke-width="1.7" marker-end="url(#arrow-yellow)"/>

  <!-- Paged KV contract -->
  <text x="50" y="300" font-size="15" font-weight="bold" fill="#aaaaaa">PAGED KV CONTRACT: what changes inside the graph</text>

  <rect x="70" y="325" width="490" height="160" rx="6" fill="#3a3a4a" stroke="#888" stroke-width="1.5"/>
  <text x="315" y="350" text-anchor="middle" font-weight="bold" fill="#ffffff">Before: contiguous KV cache</text>
  <text x="95" y="380" font-size="12" fill="#cccccc">past_key/value shape:</text>
  <text x="95" y="405" font-size="17" font-family="Consolas, monospace" fill="#ffffff">[full_batch_size, kv_heads, ctx_len, head_dim]</text>
  <text x="95" y="438" font-size="11" fill="#aaaaaa">Every sequence reserves the full ctx_len even if it only uses a short prefix.</text>
  <text x="95" y="460" font-size="11" fill="#aaaaaa">More max_num_seqs means much more retained KV memory.</text>

  <rect x="640" y="325" width="490" height="160" rx="6" fill="#173d31" stroke="#55c998" stroke-width="1.5"/>
  <text x="885" y="350" text-anchor="middle" font-weight="bold" fill="#ffffff">After: paged block-pool KV cache</text>
  <text x="665" y="380" font-size="12" fill="#b5f0d2">past_key/value shape:</text>
  <text x="665" y="405" font-size="17" font-family="Consolas, monospace" fill="#ffffff">[num_blocks, kv_heads, page_size, head_dim]</text>
  <text x="665" y="438" font-size="11" fill="#b5f0d2">Each request carries block_table rows from vLLM's KV manager.</text>
  <text x="665" y="460" font-size="11" fill="#b5f0d2">Waste is bounded by page_size rather than ctx_len per sequence.</text>

  <line x1="560" y1="405" x2="640" y2="405" stroke="#55c998" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="600" y="390" text-anchor="middle" font-size="10" fill="#55c998">replace layout</text>

  <!-- Runtime lane -->
  <text x="50" y="545" font-size="15" font-weight="bold" fill="#aaaaaa">RUNTIME: vLLM schedules blocks, QPC consumes block_table</text>

  <rect x="60" y="570" width="220" height="100" rx="6" fill="#1a3a5c" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="170" y="594" text-anchor="middle" font-weight="bold" fill="#ffffff">vLLM KV manager</text>
  <text x="170" y="612" text-anchor="middle" font-size="10" fill="#aadcff">allocates physical blocks</text>
  <text x="170" y="627" text-anchor="middle" font-size="10" fill="#aadcff">builds block_table[req, block]</text>
  <text x="170" y="642" text-anchor="middle" font-size="10" fill="#aadcff">same scheduler owns max_num_seqs</text>

  <rect x="330" y="570" width="220" height="100" rx="6" fill="#1a3a5c" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="440" y="594" text-anchor="middle" font-weight="bold" fill="#ffffff">QaicModelRunner</text>
  <text x="440" y="612" text-anchor="middle" font-size="10" fill="#aadcff">packs input_ids / positions</text>
  <text x="440" y="627" text-anchor="middle" font-size="10" fill="#aadcff">passes full block_table rows</text>
  <text x="440" y="642" text-anchor="middle" font-size="10" fill="#aadcff">prefill/decode use same contract</text>

  <rect x="600" y="570" width="220" height="100" rx="6" fill="#3d3520" stroke="#d4a843" stroke-width="1.5"/>
  <text x="710" y="594" text-anchor="middle" font-weight="bold" fill="#ffd966">QaicCausalLM</text>
  <text x="710" y="612" text-anchor="middle" font-size="10" fill="#c9a84c">session.run() feeds QPC inputs</text>
  <text x="710" y="627" text-anchor="middle" font-size="10" fill="#c9a84c">block_table binding must exist</text>
  <text x="710" y="642" text-anchor="middle" font-size="10" fill="#c9a84c">retained KV stays on card</text>

  <rect x="870" y="570" width="250" height="100" rx="6" fill="#3d3520" stroke="#d4a843" stroke-width="1.5"/>
  <text x="995" y="594" text-anchor="middle" font-weight="bold" fill="#ffd966">Paged attention in QPC</text>
  <text x="995" y="612" text-anchor="middle" font-size="10" fill="#c9a84c">logical = pos // page_size</text>
  <text x="995" y="627" text-anchor="middle" font-size="10" fill="#c9a84c">physical = block_table[row, logical]</text>
  <text x="995" y="642" text-anchor="middle" font-size="10" fill="#c9a84c">GatherND/ScatterND address KV pool</text>

  <line x1="280" y1="620" x2="330" y2="620" stroke="#4a9eff" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <line x1="550" y1="620" x2="600" y2="620" stroke="#4a9eff" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <line x1="820" y1="620" x2="870" y2="620" stroke="#d4a843" stroke-width="1.7" marker-end="url(#arrow-yellow)"/>

  <!-- Contract callout -->
  <rect x="145" y="735" width="910" height="95" rx="6" fill="#2b2536" stroke="#b47aff" stroke-width="1.3"/>
  <text x="600" y="758" text-anchor="middle" font-weight="bold" fill="#ffffff">Critical serve/compile contract</text>
  <text x="180" y="786" font-size="13" fill="#e5d6ff">QEfficient compile:</text>
  <text x="330" y="786" font-size="13" font-family="Consolas, monospace" fill="#ffffff">page_size=128, num_blocks=N, ctx_len=C</text>
  <text x="180" y="813" font-size="13" fill="#e5d6ff">vLLM serve:</text>
  <text x="330" y="813" font-size="13" font-family="Consolas, monospace" fill="#ffffff">--additional-config '{"paged_kv":true,"page_size":128,"num_blocks":N}'</text>
  <text x="600" y="836" text-anchor="middle" font-size="11" fill="#cbb6ff">N must match exactly. Runtime block_table width must not exceed max_num_blocks = ceil(C / page_size).</text>

  <defs>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffb86c"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d4a843"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#55c998"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a9eff"/>
    </marker>
  </defs>
</svg>
