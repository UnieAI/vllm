services:
  uifw-1:
    image: jeff/dsc:latest
    runtime: nvidia
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - /home/ubuntu/workspace:/workspace
      - /home/ubuntu/models:/models
      - /modelz:/modelz
    working_dir: /workspace
    command:
      - bash
      - -lc
      - |
          source /workspace/nctu6/ascend/vllm-jeff/.venv/bin/activate
          source /workspace/nctu6/ascend/vllm-jeff/dsc-env.sh
          exec vllm serve /modelz/Qwen/Qwen3-8B \
            --served-model-name test \
            --host 0.0.0.0 \
            --port 8976 \
            --tensor-parallel-size 1 \
            --trust-remote-code \
            --speculative-enable-load 80000 \
            --speculative-disable-load 100000 \
            --dtype float16 \
            --max-num-batched-tokens 16384 \
            --speculative-config '{"method":"ngram","num_speculative_tokens":4,"draft_tensor_parallel_size":1,"prompt_lookup_min":3,"prompt_lookup_max":8}'
    shm_size: '2gb'
    ulimits:
      memlock: -1
      stack: 67108864
